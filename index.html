<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Iniciativas de mejora · Grupo Jockey</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="/encuesta-mejora.css" />
</head>

<body>

<main class="jp-canvas" id="jpCanvas">

  <!-- HEADER -->
  <header class="jp-topbar">
    <img src="/grupo-jockey-logo.png" alt="Grupo Jockey" class="jp-logo-img" />
    <div class="jp-meta">Iniciativas de mejora · Colaboradores</div>
  </header>

  <!-- TITULO -->
  <div class="jp-title-bar">
    <div class="jp-eyebrow">Registro</div>
    <h1 class="jp-title">Registro de mejora de procesos</h1>
    <p class="jp-subtitle">
      Cuéntanos qué proceso quieres optimizar. Te toma ~5 minutos.
    </p>
  </div>

  <!-- STEPPER -->
  <nav class="jp-stepper" role="tablist" aria-label="Pasos del formulario">

    <button type="button"
            class="jp-tab active"
            data-tab="1"
            role="tab"
            aria-selected="true">

      <span class="jp-tab-num">Paso 1</span>
      <span class="jp-tab-label">Clasificación</span>
    </button>

    <button type="button"
            class="jp-tab"
            data-tab="2"
            role="tab"
            aria-selected="false">

      <span class="jp-tab-num">Paso 2</span>
      <span class="jp-tab-label">Contexto</span>
    </button>

    <button type="button"
            class="jp-tab"
            data-tab="3"
            role="tab"
            aria-selected="false">

      <span class="jp-tab-num">Paso 3</span>
      <span class="jp-tab-label">Detalle operativo</span>
    </button>

  </nav>

  <!-- STAGE -->
  <section class="jp-stage">

    <svg class="jp-stage-line" viewBox="0 0 480 480" aria-hidden="true">
      <defs>
        <linearGradient id="jpGradFinal" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#896EFF"/>
          <stop offset="40%" stop-color="#C559F5"/>
          <stop offset="70%" stop-color="#FFBDF0"/>
          <stop offset="100%" stop-color="#00FFE7"/>
        </linearGradient>
      </defs>

      <path d="M 470 50 C 380 90, 280 30, 250 180
               S 320 320, 240 360
               C 170 390, 110 300, 180 220
               S 290 130, 420 270
               C 480 340, 440 440, 360 460"
            stroke="url(#jpGradFinal)"
            stroke-width="2.2"
            fill="none"
            stroke-linecap="round"/>
    </svg>

    <form class="jp-form" id="jpForm" autocomplete="off" novalidate>

      <!-- PASO 1 -->
      <div class="jp-section active" data-section="1">

        <div class="jp-q">
          <label class="jp-label">
            ¿Cómo clasificarías esta iniciativa?
          </label>

          <div class="jp-cards" role="radiogroup" aria-label="Clasificación">

            <button type="button"
                    class="jp-card"
                    data-q="clasificacion"
                    data-val="recurrente">

              <span class="jp-card-title">Proceso recurrente</span>
              <span class="jp-card-desc">Se repite con frecuencia</span>

            </button>

            <button type="button"
                    class="jp-card"
                    data-q="clasificacion"
                    data-val="critico">

              <span class="jp-card-title">Proceso crítico</span>
              <span class="jp-card-desc">Alto impacto en el negocio</span>

            </button>

            <button type="button"
                    class="jp-card"
                    data-q="clasificacion"
                    data-val="optimizacion">

              <span class="jp-card-title">Optimización adicional</span>
              <span class="jp-card-desc">Oportunidad de mejora</span>

            </button>

          </div>
        </div>

        <div class="jp-q">
          <label class="jp-label" for="fProceso">
            Nombre del proceso
          </label>

          <input type="text"
                 id="fProceso"
                 class="jp-input"
                 placeholder="Ej. Cierre de caja de estacionamientos"
                 maxlength="200" />
        </div>

        <div class="jp-q">

          <label class="jp-label">
            ¿Cuál es el alcance de este proceso o problemática?
          </label>

          <div class="jp-chips" role="radiogroup" aria-label="Alcance">

            <button type="button"
                    class="jp-chip"
                    data-q="alcance"
                    data-val="solo">

              Solo mi trabajo
            </button>

            <button type="button"
                    class="jp-chip"
                    data-q="alcance"
                    data-val="equipo">

              Mi equipo
            </button>

            <button type="button"
                    class="jp-chip"
                    data-q="alcance"
                    data-val="varias">

              Varias áreas
            </button>

          </div>
        </div>

      </div>

      <!-- PASO 2 -->
      <div class="jp-section" data-section="2">

        <div class="jp-q">

          <label class="jp-label" for="fOportunidad">
            Menciona la oportunidad de mejora
          </label>

          <input type="text"
                 id="fOportunidad"
                 class="jp-input"
                 placeholder="En una frase, qué se podría mejorar"
                 maxlength="300" />
        </div>

        <div class="jp-q">

          <label class="jp-label" for="fProblematica">
            Cuéntanos detalladamente la problemática que has identificado
          </label>

          <textarea id="fProblematica"
                    class="jp-textarea"
                    placeholder="Describe el problema"
                    maxlength="2000"></textarea>
        </div>

      </div>

      <!-- PASO 3 -->
      <div class="jp-section" data-section="3">

        <div class="jp-q">

          <label class="jp-label" for="fFrecuencia">
            ¿Con qué frecuencia se realiza?
          </label>

          <select id="fFrecuencia" class="jp-select">

            <option value="">Selecciona una opción</option>
            <option value="diaria">Diaria</option>
            <option value="interdiaria">Interdiaria</option>
            <option value="semanal">Semanal</option>
            <option value="mensual">Mensual</option>

          </select>
        </div>

      </div>

    </form>

  </section>

  <!-- NAV -->
  <nav class="jp-nav" id="jpNav">

    <button type="button"
            class="jp-btn jp-btn-ghost"
            id="jpBack">

      ← Anterior
    </button>

    <div class="jp-nav-right">

      <button type="button"
              class="jp-btn"
              id="jpNext">

        Siguiente →
      </button>

    </div>

  </nav>

</main>

<script src="/encuesta-mejora.js"></script>

</body>
</html>
